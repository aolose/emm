name: Deploy
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'doc/**'
      - '**/*.draft.md'
      - '.gitignore'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
      - name: Install dependencies
        run: bun i
      - name: Build
        run: bun run build
      - name: Package
        run: tar czf dist.tar.gz -C dist .
      - name: Depoly
        uses: kostya-ten/ssh-server-deploy@v4
        with:
          host: ${{ secrets.VPS_ADDR }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USR }}
          private_key: ${{ secrets.VPS_KEY }}
          scp_source: 'dist.tar.gz'
          scp_target: '/home/aolose/errApp/'
          after_script: |
            cd /home/aolose/errApp/
            tar xzf dist.tar.gz --overwrite
            rm dist.tar.gz
            echo "${{ secrets.VPS_PWD }}" | sudo -S service errApp restart
